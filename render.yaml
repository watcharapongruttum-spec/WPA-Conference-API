services:

  # ── Web (Rails API) ──────────────────────────────
  - type: web
    name: wpa-api
    env: docker
    dockerfilePath: ./Dockerfile
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT
    envVars:
      - fromGroup: wpa-production

  # ── Worker (Sidekiq) ─────────────────────────────
  - type: worker
    name: wpa-sidekiq
    env: docker
    dockerfilePath: ./Dockerfile
    startCommand: bundle exec sidekiq -C config/sidekiq.yml
    envVars:
      - fromGroup: wpa-production